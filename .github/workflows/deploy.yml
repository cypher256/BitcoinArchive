name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (required by rehype-mermaid for SVG render)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Fail build on per-page render errors
        run: |
          # Astro logs `[ERROR] [glob-loader] Error rendering ...` per failing
          # page but exits 0, so the workflow would record "success" even
          # when Mermaid pages or markdown rendering blew up. Promote any
          # such line to a hard failure so the artifact upload does not
          # publish a half-rendered dist/.
          if grep -E '\[ERROR\]|browserType\.launch:|Cannot find|EISDIR|MODULE_NOT_FOUND' build.log; then
            echo "::error::Astro reported render errors during build (see lines above). Failing the deploy."
            exit 1
          fi
          echo "No render errors detected in build log."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
