<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="100%" font-family="'Courier New', monospace" font-size="12" fill="#000">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Transaction box -->
  <rect x="140" y="30" width="140" height="140" rx="1" stroke="#000" fill="none" stroke-width="1"/>
  <text x="210" y="105" text-anchor="middle" font-size="13" font-weight="bold">Transaction</text>

  <!-- Input arrows -->
  <line x1="20" y1="60" x2="138" y2="60" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="30" y="54" font-size="11">In</text>

  <line x1="20" y1="100" x2="138" y2="100" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="30" y="94" font-size="11">In</text>

  <text x="70" y="138" text-anchor="middle" font-size="14">...</text>

  <!-- Output arrows -->
  <line x1="280" y1="70" x2="398" y2="70" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="370" y="64" font-size="11">Out</text>

  <line x1="280" y1="130" x2="398" y2="130" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="370" y="124" font-size="11">Out</text>
</svg>