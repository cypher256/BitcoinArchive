name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (required by rehype-mermaid for SVG render)
        run: npx playwright install --with-deps chromium

      - name: Build
        env:
          CF_PAGES: "1"
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Fail build on per-page render errors
        run: |
          # Astro logs `[ERROR] [glob-loader] Error rendering ...` per failing
          # page but exits 0, so the deploy job records "success" even when
          # Mermaid pages or markdown rendering blew up. Promote any such
          # line to a hard failure so Cloudflare/Pages does not get a
          # half-rendered dist/.
          if grep -E '\[ERROR\]|browserType\.launch:|Cannot find|EISDIR|MODULE_NOT_FOUND' build.log; then
            echo "::error::Astro reported render errors during build (see lines above). Failing the deploy."
            exit 1
          fi
          echo "No render errors detected in build log."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=bitcoin-institute --branch=main
