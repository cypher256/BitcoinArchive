<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 130" width="100%" font-family="'Courier New', monospace" font-size="12" fill="#000">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#000"/>
    </marker>
  </defs>

  <!-- Block 1 -->
  <g transform="translate(30,10)">
    <rect x="0" y="0" width="220" height="100" rx="1" stroke="#000" fill="none" stroke-width="1"/>

    <!-- Hash row -->
    <rect x="60" y="10" width="100" height="24" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="110" y="26" text-anchor="middle" font-size="12">Hash</text>

    <!-- Items row -->
    <rect x="15" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="42" y="72" text-anchor="middle" font-size="11">Item</text>

    <rect x="82" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="110" y="72" text-anchor="middle" font-size="11">Item</text>

    <rect x="150" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="178" y="72" text-anchor="middle" font-size="11">...</text>
  </g>

  <!-- Arrow between blocks -->
  <line x1="250" y1="32" x2="352" y2="32" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Block 2 -->
  <g transform="translate(340,10)">
    <rect x="0" y="0" width="220" height="100" rx="1" stroke="#000" fill="none" stroke-width="1"/>

    <!-- Hash row -->
    <rect x="60" y="10" width="100" height="24" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="110" y="26" text-anchor="middle" font-size="12">Hash</text>

    <!-- Items row -->
    <rect x="15" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="42" y="72" text-anchor="middle" font-size="11">Item</text>

    <rect x="82" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="110" y="72" text-anchor="middle" font-size="11">Item</text>

    <rect x="150" y="50" width="55" height="36" rx="1" stroke="#000" fill="none" stroke-width="1"/>
    <text x="178" y="72" text-anchor="middle" font-size="11">...</text>
  </g>

  <!-- Arrow to next (continuation) -->
  <line x1="560" y1="32" x2="610" y2="32" stroke="#000" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Continuation dots left -->
  <text x="5" y="36" font-size="16">...</text>
</svg>